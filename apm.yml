name: draigara-forge
version: 0.1.0-preview.1
description: Repository-aware discovery and selection of APM marketplace packages through Draigara Forge.
author:
  name: Draigara
license: Apache-2.0
repository: https://github.com/draigara/draigara-forge-plugin
homepage: https://github.com/draigara/draigara-forge-plugin
keywords:
  - apm
  - agent-skills
  - developer-tools
dependencies:
  apm: []
  mcp:
    - name: draigara-forge
      registry: false
      transport: stdio
      command: forge
      args:
        - mcp
includes:
  - .apm/skills/forge
devDependencies:
  apm: []
scripts: {}
