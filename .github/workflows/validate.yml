name: Validate Plugin

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - name: Reject superseded active artifacts
        shell: pwsh
        run: ./tools/Validate-Repository.ps1
      - name: Validate intentional portable payload
        run: uvx --from apm-cli==0.26.0 apm pack --dry-run --verbose
      - name: Pack portable plugin
        run: uvx --from apm-cli==0.26.0 apm pack --archive -o "${RUNNER_TEMP}/forge-plugin"
